name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build
        run: yarn build:github
        env:
          VITE_BASE_PATH: /demo-travel-system/
          VITE_TICA_TOUR_API_BASE_URL: ${{ vars.VITE_TICA_TOUR_API_BASE_URL }}
          VITE_API_CLIENT_LOGIN: ${{ vars.VITE_API_CLIENT_LOGIN }}
          VITE_API_CLIENT_LOGOUT: ${{ vars.VITE_API_CLIENT_LOGOUT }}
          VITE_API_CLIENT_PROFILE: ${{ vars.VITE_API_CLIENT_PROFILE }}
          VITE_API_CLIENT_REFRESH: ${{ vars.VITE_API_CLIENT_REFRESH }}
          VITE_API_CLIENT_SIGNUP: ${{ vars.VITE_API_CLIENT_SIGNUP }}
          VITE_API_CLIENT_SOCIAL_LOGIN: ${{ vars.VITE_API_CLIENT_SOCIAL_LOGIN }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_AUTH_BASE_URL: ${{ vars.VITE_SUPABASE_AUTH_BASE_URL }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
